server.port=${PORT_BRAIN:4000}

# Groq
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=deepseek-r1-distill-llama-70b

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Brave Search
brave.api.key=${BRAVE_API_KEY}
brave.api.url=https://api.search.brave.com/res/v1/web/search

# OpenWeatherMap
weather.api.key=${OPENWEATHER_API_KEY}
weather.api.url=https://api.openweathermap.org/data/2.5

# Sandbox
brain.sandbox.path=/opt/brain-sandbox

# CORS
brain.allowed.origins=https://familychat.gilmotech.be,http://localhost:3000

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/gilmobrain
spring.datasource.username=gilmobrain
spring.datasource.password=GilmoBrain2025x
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Multipart (avatars)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
brain.avatars.path=/opt/familychat-avatars
brain.avatars.url=https://brain.gilmotech.be/avatars

# Logging
logging.level.be.gilmotech.brain=INFO
