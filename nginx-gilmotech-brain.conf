server {
    listen 80;
    server_name brain.gilmotech.be;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name brain.gilmotech.be;

    ssl_certificate /etc/letsencrypt/live/brain.gilmotech.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brain.gilmotech.be/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;

        # Sécurité : token secret obligatoire
        if ($http_x_brain_token != "BRAIN_SECRET_TOKEN") {
            return 403;
        }
    }
}
