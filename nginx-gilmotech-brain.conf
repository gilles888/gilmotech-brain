server {
    listen 80;
    server_name brain.gilmotech.be;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name brain.gilmotech.be;

    ssl_certificate /etc/letsencrypt/live/brain.gilmotech.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brain.gilmotech.be/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Avatars statiques
    location /avatars/ {
        alias /opt/familychat-avatars/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        if ($http_x_brain_token != "02a6a705683c7622fe71632559b3ec8b0a03d32cb7a9fe9d2419f02d459fca51") {
            return 403;
        }
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
